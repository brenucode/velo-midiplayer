<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Velo Mini</title>
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>
  <div class="stage" id="stage">
    <div class="pill" id="pill">
      <div class="sheen" aria-hidden="true"></div>

      <div class="head">
        <div class="art" id="art" aria-hidden="true">
          <span class="eq"><i></i><i></i><i></i><i></i></span>
        </div>
        <div class="meta">
          <div class="title" id="title">Nothing playing</div>
        </div>
        <button class="x" id="closeBtn" title="Hide the mini-player">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>

      <div class="seek">
        <span class="t" id="tCur">0:00</span>
        <div class="bar" id="bar"><div class="fill" id="fill"></div><span class="knob" id="knob"></span></div>
        <span class="t" id="tTot">0:00</span>
      </div>

      <div class="controls">
        <div class="transport">
          <button class="ic" id="prevBtn" title="Previous">
            <svg viewBox="0 0 24 24" width="17" height="17"><rect x="5" y="6" width="2.3" height="12" rx="1.1" fill="currentColor"/><path d="M18 6 9 12l9 6Z" fill="currentColor"/></svg>
          </button>
          <button class="pp" id="ppBtn" title="Play / Pause">
            <svg class="i-play" viewBox="0 0 24 24" width="18" height="18"><path d="M8 5v14l11-7-11-7z" fill="currentColor"/></svg>
            <svg class="i-pause" viewBox="0 0 24 24" width="18" height="18"><rect x="6" y="5" width="4" height="14" rx="1.4" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1.4" fill="currentColor"/></svg>
          </button>
          <button class="ic" id="nextBtn" title="Next">
            <svg viewBox="0 0 24 24" width="17" height="17"><rect x="16.7" y="6" width="2.3" height="12" rx="1.1" fill="currentColor"/><path d="M6 6l9 6-9 6Z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="rt">
          <div class="spd">
            <button id="spdDown" title="Slower" aria-label="Slower">
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
            </button>
            <span id="spdVal">100%</span>
            <button id="spdUp" title="Faster" aria-label="Faster">
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
            </button>
          </div>
          <button class="style" id="styleBtn" title="Play style — click to cycle">Faithful</button>
        </div>
      </div>

      <!-- drag these edges/corner to resize the pill -->
      <div class="rz rz-r" data-rz="r" title="Drag to resize"></div>
      <div class="rz rz-b" data-rz="b" title="Drag to resize"></div>
      <div class="rz rz-c" data-rz="c" title="Drag to resize"></div>
      <span class="grip" aria-hidden="true">
        <svg viewBox="0 0 10 10" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M9 3 3 9M9 6.5 6.5 9"/></svg>
      </span>
    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
