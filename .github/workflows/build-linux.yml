name: build-linux

# Builds the Linux AppImage on a real Linux runner — so a Linux machine is NOT
# needed to ship it. Triggers:
#   * push a tag  v*   → builds AND attaches the AppImage to that GitHub Release
#   * "Run workflow"   → builds and uploads the AppImage as a downloadable
#                        artifact only (great for handing a test build to a
#                        Linux tester before cutting a release)
on:
  push:
    tags: ['v*', 'linux-test-*']   # v* = real release; linux-test-* = test build
  workflow_dispatch:

permissions:
  contents: write          # needed to attach the asset to the Release

jobs:
  appimage:
    # ubuntu-22.04 → older glibc → the AppImage runs on a wider range of distros.
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # Use the DISTRO's PyGObject (python3-gi) + GTK + WebKit2GTK. We do NOT
      # pip-install pygobject — building it from source needs a newer
      # girepository than the runner ships, which is the usual failure. The
      # apt package is prebuilt against this exact GTK, so it just works.
      - name: Install system Python + GTK / WebKit + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python3-venv python3-dev \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.0 \
            libgtk-3-0 libwebkit2gtk-4.0-37 \
            libasound2 libasound2-dev \
            file desktop-file-utils fuse libfuse2 imagemagick

      # A venv with --system-site-packages can SEE the apt PyGObject while still
      # letting us pip-install the pure-Python deps + PyInstaller on top.
      - name: Create venv + install Python dependencies
        run: |
          python3 -m venv --system-site-packages build-venv
          . build-venv/bin/activate
          python -m pip install --upgrade pip wheel
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install -r requirements-linux.txt
          # fail loudly here if the GTK/WebKit bindings aren't importable
          python - <<'PY'
          import gi
          gi.require_version('Gtk', '3.0')
          gi.require_version('WebKit2', '4.0')
          from gi.repository import Gtk, WebKit2   # noqa: F401
          print("gi / GTK / WebKit2 import OK")
          PY

      # Linux PyInstaller spec — mirrors Velo.spec but DROPS the Windows-only
      # bits (comtypes/pycaw/.ico/version) and collects `gi` so GTK/WebKit load.
      - name: Write Velo-linux.spec
        run: |
          cat > Velo-linux.spec <<'SPEC'
          # -*- mode: python ; coding: utf-8 -*-
          from PyInstaller.utils.hooks import collect_all

          datas = [('velo/web', 'velo/web'),
                   ('assets/defaultConfig.json', 'assets')]
          binaries = []
          hiddenimports = ['mido.backends.rtmidi', 'psutil',
                           'gi', 'gi.repository.Gtk', 'gi.repository.WebKit2']

          for pkg in ('webview', 'gi'):
              d, b, h = collect_all(pkg)
              datas += d; binaries += b; hiddenimports += h

          a = Analysis(['velo_app.py'], pathex=['.'], binaries=binaries,
                       datas=datas, hiddenimports=hiddenimports, noarchive=False)
          pyz = PYZ(a.pure)
          exe = EXE(pyz, a.scripts, [], exclude_binaries=True, name='Velo',
                    console=False, upx=False)
          coll = COLLECT(exe, a.binaries, a.datas, strip=False, upx=False,
                         name='Velo')
          SPEC

      - name: Build with PyInstaller
        run: |
          . build-venv/bin/activate
          pyinstaller --noconfirm --clean Velo-linux.spec

      # Some webkit2gtk runtime helpers (the web-process binary + injected
      # bundle) live in libexec and aren't always picked up — copy them in so
      # the embedded browser can spawn its renderer.
      - name: Bundle WebKit2GTK runtime helpers (best-effort)
        run: |
          set -e
          for d in /usr/lib/x86_64-linux-gnu/webkit2gtk-4.0 \
                   /usr/libexec/webkit2gtk-4.0; do
            if [ -d "$d" ]; then
              mkdir -p "dist/Velo/$(basename "$d")"
              cp -r "$d/." "dist/Velo/$(basename "$d")/" || true
            fi
          done

      - name: Assemble AppDir
        run: |
          set -e
          APP=Velo.AppDir
          rm -rf "$APP"
          mkdir -p "$APP/usr/bin" "$APP/usr/share/applications" \
                   "$APP/usr/share/icons/hicolor/256x256/apps"
          cp -r dist/Velo/. "$APP/usr/bin/"

          # icon: convert the .ico to png if possible, else a 1x1 placeholder
          if command -v convert >/dev/null 2>&1 && [ -f assets/icons/velo.ico ]; then
            convert "assets/icons/velo.ico[0]" "$APP/usr/share/icons/hicolor/256x256/apps/velo.png" || true
          fi
          if [ ! -f "$APP/usr/share/icons/hicolor/256x256/apps/velo.png" ]; then
            printf '\x89PNG\r\n\x1a\n' > "$APP/velo.png"   # minimal placeholder
            cp "$APP/velo.png" "$APP/usr/share/icons/hicolor/256x256/apps/velo.png" || true
          fi
          cp "$APP/usr/share/icons/hicolor/256x256/apps/velo.png" "$APP/velo.png" 2>/dev/null || true

          cat > "$APP/velo.desktop" <<'DESK'
          [Desktop Entry]
          Type=Application
          Name=Velo
          Comment=A clean MIDI player with practice studio and stage mode
          Exec=Velo
          Icon=velo
          Categories=Audio;AudioVideo;Music;
          Terminal=false
          DESK
          cp "$APP/velo.desktop" "$APP/usr/share/applications/velo.desktop"

          cat > "$APP/AppRun" <<'RUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/bin:$LD_LIBRARY_PATH"
          # use the host's GTK/WebKit typelibs + the bundled ones
          export GI_TYPELIB_PATH="$HERE/usr/bin:$GI_TYPELIB_PATH"
          exec "$HERE/usr/bin/Velo" "$@"
          RUN
          chmod +x "$APP/AppRun"

      - name: Build AppImage
        run: |
          set -e
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --no-appstream Velo.AppDir Velo-x86_64.AppImage

      - name: Upload AppImage as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Velo-x86_64.AppImage
          path: Velo-x86_64.AppImage

      # On any tag: publish a Release with the AppImage attached so testers get a
      # public download link. Test tags (linux-test-*) publish as a PRE-RELEASE,
      # which the in-app updater ignores (it only reads the latest stable).
      - name: Publish Release with the AppImage
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Velo-x86_64.AppImage
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'test') }}
